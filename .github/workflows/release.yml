name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag (e.g. v0.1.0)"
        required: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact_glob: "src-tauri/target/release/bundle/dmg/*.dmg"
            artifact_name_suffix: "mac"
          - os: windows-latest
            artifact_glob: "src-tauri/target/release/bundle/nsis/*.exe"
            artifact_name_suffix: "windows"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app
        run: npm run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: splecnote-${{ matrix.artifact_name_suffix }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: splecnote-mac
          path: dist/mac

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: splecnote-windows
          path: dist/windows

      - name: Rename artifacts for clarity
        run: |
          cd dist/mac && for f in *.dmg; do mv "$f" "SplecNote-mac.dmg"; done
          cd dist/windows && for f in *.exe; do mv "$f" "SplecNote-windows-setup.exe"; done

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || inputs.tag }}
          name: "Splec Note ${{ github.ref_name || inputs.tag }}"
          body: |
            ## Splec Note ${{ github.ref_name || inputs.tag }}

            A lightweight, distinctive cross-platform text & code editor for notes and coding.

            ### Downloads
            | Platform | File |
            |----------|------|
            | macOS (Universal) | `SplecNote-mac.dmg` |
            | Windows | `SplecNote-windows-setup.exe` |

            ### What's new
            See [README](https://github.com/srikanthpullela/SplecNote-app#readme) for full feature list.
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
          files: |
            dist/mac/*.dmg
            dist/windows/*.exe
