name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag (e.g. v0.1.0)"
        required: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact_glob: "src-tauri/target/release/bundle/dmg/*.dmg"
            artifact_name_suffix: "mac"
          - os: windows-latest
            artifact_glob: "src-tauri/target/release/bundle/nsis/*.exe"
            artifact_name_suffix: "windows"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install npm dependencies
        run: npm ci

      # ── Windows code signing ────────────────────────────────────────────────
      # Imports a PFX certificate (stored as a base64 secret) into the Windows
      # certificate store, then exposes its thumbprint so Tauri can call
      # signtool during the bundle step.  Skipped silently when the secret is
      # absent (e.g. unsigned dev/preview builds).
      - name: Import Windows code-signing certificate
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          CERT_B64: ${{ secrets.WINDOWS_CERTIFICATE }}
          CERT_PWD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          if (-not $env:CERT_B64) {
            Write-Host "WINDOWS_CERTIFICATE secret not set — building without signing."
            exit 0
          }
          $pfxBytes = [System.Convert]::FromBase64String($env:CERT_B64)
          $pfxPath  = "$env:RUNNER_TEMP\splecnote-sign.pfx"
          [System.IO.File]::WriteAllBytes($pfxPath, $pfxBytes)
          $securePwd = ConvertTo-SecureString $env:CERT_PWD -Force -AsPlainText
          $cert = Import-PfxCertificate `
                    -FilePath $pfxPath `
                    -CertStoreLocation Cert:\CurrentUser\My `
                    -Password $securePwd
          "TAURI_WINDOWS_CERTIFICATE_THUMBPRINT=$($cert.Thumbprint)" |
            Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Remove-Item $pfxPath -Force
          Write-Host "Certificate imported. Thumbprint=$($cert.Thumbprint)"

      - name: Build Tauri app
        run: npm run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Windows code signing (thumbprint set by the import step above)
          TAURI_WINDOWS_CERTIFICATE_THUMBPRINT: ${{ env.TAURI_WINDOWS_CERTIFICATE_THUMBPRINT }}
          # Apple code signing + notarization (macOS runner only)
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: splecnote-${{ matrix.artifact_name_suffix }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: splecnote-mac
          path: dist/mac

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: splecnote-windows
          path: dist/windows

      - name: Rename artifacts for clarity
        run: |
          (cd dist/mac && for f in *.dmg; do mv "$f" "SplecNote-mac.dmg"; done)
          (cd dist/windows && for f in *.exe; do mv "$f" "SplecNote-windows-setup.exe"; done)

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || inputs.tag }}
          name: "Splec Note ${{ github.ref_name || inputs.tag }}"
          body: |
            ## Splec Note ${{ github.ref_name || inputs.tag }}

            A lightweight, distinctive cross-platform text & code editor for notes and coding.

            ### Downloads
            | Platform | File |
            |----------|------|
            | macOS (Universal) | `SplecNote-mac.dmg` |
            | Windows | `SplecNote-windows-setup.exe` |

            ### What's new
            See [README](https://github.com/srikanthpullela/SplecNote-app#readme) for full feature list.
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
          files: |
            dist/mac/*.dmg
            dist/windows/*.exe
